<script>

async function getSchedules(){

    if(window.firebaseReady){

        const data = await window.getSchedules();

        return data || [];

    }

    return [];

}

async function saveSchedules(data){

    if(window.firebaseReady){

        await window.saveSchedules(data);

    }

}

async function getCustomers(){

    if(window.firebaseReady){

        const data = await window.getCustomers();

        return data || [];

    }

    return [];

}

async function saveCustomers(data){

    if(window.firebaseReady){

        await window.saveCustomers(data);

    }

}

async function addCustomer(){

    const customers = await getCustomers();

    customers.push({

        name:document.getElementById("customerName").value,

        phone:document.getElementById("customerPhone").value,

        address:document.getElementById("customerAddress").value,

        memo:document.getElementById("customerMemo").value

    });

    await saveCustomers(customers);

    document.getElementById("customerList").innerHTML="";

    document.getElementById("customerName").value="";

    document.getElementById("customerPhone").value="";

    document.getElementById("customerAddress").value="";

    document.getElementById("customerMemo").value="";

    alert("고객 저장 완료");

}

async function renderCustomerPage(){

    const keyword = document.getElementById("customerPageSearch")

    .value

    .toLowerCase();

    const area = document.getElementById("customerPageList");

    area.innerHTML="";

    const customers = await getCustomers();

    customers

    .filter(c=>

        keyword===""

        ||

        (c.name || "").toLowerCase().includes(keyword)

        ||

        (c.phone || "").includes(keyword)

    )

    .forEach(c=>{

        area.innerHTML += `

<div class="customer-card">

<b>${c.name}</b><br>

📞 ${c.phone}<br>

${c.address ? "🏠 "+c.address+"<br>" : ""}

${c.memo ? "📝 "+c.memo : ""}

<br><br>

<button>수정</button>

<button>삭제</button>

</div>

`;

    });

}

async function renderCustomers(){

    const keyword = document.getElementById("searchInput").value.toLowerCase();

    const list = document.getElementById("customerList");

    if(keyword===""){

        list.style.display="none";

        list.innerHTML="";

        return;

    }

    list.style.display="block";

    list.innerHTML="";

    const customers = await getCustomers();

    customers

    .filter(c =>

        (c.name || "").toLowerCase().includes(keyword)

        ||

        (c.phone || "").includes(keyword)

    )

    .forEach(c=>{

        list.innerHTML += `

<div class="customer-card">

<b>${c.name}</b><br>

📞 ${c.phone}<br>

${c.address ? "🏠 "+c.address+"<br>" : ""}

${c.memo ? "📝 "+c.memo : ""}

</div>

`;

    });

}

async function searchScheduleCustomers(){

    const keyword = document.getElementById("customerSearch")

    .value

    .toLowerCase();

    const area = document.getElementById("scheduleCustomerList");

    area.innerHTML="";

    if(keyword===""){

        return;

    }

    const customers = await getCustomers();

    customers

    .filter(c=>

        (c.name || "").toLowerCase().includes(keyword)

        ||

        (c.phone || "").includes(keyword)

    )

    .forEach(c=>{

        area.innerHTML += `

<div class="customer-card">

${c.name} / ${c.phone}

</div>

`;

    });

}

async function renderCalendar(){

    const schedules = await getSchedules();

    console.log(schedules);

}

async function saveSchedule(){

    const schedules = await getSchedules();

    await saveSchedules(schedules);

}

async function deleteSelected(){

    let schedules = await getSchedules();

    await saveSchedules(schedules);

}

async function editSelected(){

    const schedules = await getSchedules();

}

async function saveEditedSchedule(){

    let schedules = await getSchedules();

    await saveSchedules(schedules);

}

window.addEventListener("load", async ()=>{

    await renderCalendar();

});

</script>
