<style>
body{margin:0;font-family:Arial;background:#f3f4f6}
.header{background:#111827;color:white;padding:15px;font-size:24px}
.container{display:flex;min-height:100vh}
.sidebar{width:320px;background:white;border-right:1px solid #ddd;padding:15px;overflow:auto}
.main{flex:1;padding:15px}
.calendar{display:grid;grid-template-columns:repeat(7,1fr);gap:5px}
.dayname{background:#1f2937;color:white;padding:10px;text-align:center;font-weight:bold}
.day{background:white;border:1px solid #ccc;min-height:120px;padding:5px;cursor:pointer}
.date{font-size:18px;font-weight:bold}
.event{
background:#2563eb;
color:white;
padding:3px;
border-radius:5px;
margin-top:3px;
font-size:12px
}

.event.end{
background:#dc2626;
}
.modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);justify-content:center;align-items:center;z-index:999}
.modalbox{background:white;padding:20px;width:95%;max-width:500px;max-height:90vh;overflow:auto}
input,textarea,select{width:100%;padding:10px;margin-bottom:10px;box-sizing:border-box}
button{padding:10px;margin:2px}
.customer-card{background:#fff;border:1px solid #ddd;padding:10px;margin-bottom:10px}
.menu{display:none;position:fixed;background:white;border:1px solid #ccc;z-index:9999}
.menu div{padding:10px;cursor:pointer}
.menu div:hover{background:#eee}
@media(max-width:900px){
.container{flex-direction:column}
.sidebar{width:100%}
.calendar{grid-template-columns:1fr}
.dayname{display:none}
}
</style>
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<script>

let currentDate = new Date();

function getSchedules(){
return JSON.parse(localStorage.getItem("schedules") || "[]");
}

function saveSchedules(data){
localStorage.setItem("schedules", JSON.stringify(data));
}

function getCustomers(){
return JSON.parse(localStorage.getItem("customers") || "[]");
}

function saveCustomers(data){
localStorage.setItem("customers", JSON.stringify(data));
}

function addCustomer(){

const customers = getCustomers();

customers.push({
name:document.getElementById("customerName").value,
phone:document.getElementById("customerPhone").value,
address:document.getElementById("customerAddress").value,
memo:document.getElementById("customerMemo").value
});

saveCustomers(customers);

document.getElementById("customerList").innerHTML="";

document.getElementById("customerName").value="";
document.getElementById("customerPhone").value="";
document.getElementById("customerAddress").value="";
document.getElementById("customerMemo").value="";
}




function editCustomer(phone){

const customers = getCustomers();

const c = customers.find(x=>x.phone===phone);

if(!c)return;

document.getElementById("editCustomerPhoneOld").value = phone;
document.getElementById("editCustomerName").value = c.name || "";
document.getElementById("editCustomerPhone").value = c.phone || "";
document.getElementById("editCustomerAddress").value = c.address || "";
document.getElementById("editCustomerMemo").value = c.memo || "";

document.getElementById("customerEditModal").style.display="flex";

}

function closeCustomerEdit(){

document.getElementById("customerEditModal").style.display="none";

}

function saveCustomerEdit(){

const oldPhone =
document.getElementById("editCustomerPhoneOld").value;

let customers = getCustomers();

customers = customers.map(c => {

if(c.phone===oldPhone){

return{
name:document.getElementById("editCustomerName").value,
phone:document.getElementById("editCustomerPhone").value,
address:document.getElementById("editCustomerAddress").value,
memo:document.getElementById("editCustomerMemo").value
};

}

return c;

});

saveCustomers(customers);

renderCustomerPage();

closeCustomerEdit();

}

function deleteCustomer(phone){

if(!confirm("고객 삭제?")) return;

let customers = getCustomers();

customers = customers.filter(c=>c.phone!==phone);

saveCustomers(customers);

renderCustomerPage();

}
function openCustomerPage(){

document.getElementById("customerPageModal")
.style.display="flex";

renderCustomerPage();

}

function closeCustomerPage(){

document.getElementById("customerPageModal")
.style.display="none";

}

function renderCustomerPage(){

const keyword =
document.getElementById("customerPageSearch")
.value
.toLowerCase();

const area =
document.getElementById("customerPageList");

area.innerHTML="";

getCustomers()
.filter(c=>

keyword===""

||

c.name.toLowerCase().includes(keyword)
||
c.phone.includes(keyword)

)
.forEach(c=>{

area.innerHTML += `
<div class="customer-card">

<b>${c.name}</b><br>

📞 ${c.phone}<br>

${c.address ? "🏠 "+c.address+"<br>" : ""}

${c.memo ? "📝 "+c.memo : ""}

<br><br>

<button onclick="editCustomer('${c.phone}')">수정</button>

<button onclick="deleteCustomer('${c.phone}')">삭제</button>

</div>
`;

});

}

const data = customers.map(c => ({

const ws = XLSX.utils.json_to_sheet(data);

const wb = XLSX.utils.book_new();

XLSX.utils.book_append_sheet(wb, ws, "고객명단");

XLSX.writeFile(wb, "고객명단.xlsx");

}

function renderCalendar(){

const cal=document.getElementById("calendar");

cal.innerHTML="";

const y=currentDate.getFullYear();
const m=currentDate.getMonth();

document.getElementById("monthText").innerText=
y+"년 "+(m+1)+"월";

const first=new Date(y,m,1).getDay();
const last=new Date(y,m+1,0).getDate();

const names=["일","월","화","수","목","금","토"];

for(let i=0;i<7;i++){

const d=document.createElement("div");
d.className="dayname";
d.innerText=names[i];

cal.appendChild(d);
}

for(let i=0;i<first;i++){

const blank=document.createElement("div");
cal.appendChild(blank);
}

const schedules=getSchedules();

for(let d=1; d<=last; d++){

const full=
y+"-"+String(m+1).padStart(2,"0")+"-"+String(d).padStart(2,"0");

const box=document.createElement("div");
box.className="day";

const date=document.createElement("div");
date.className="date";
date.innerText=d;

box.appendChild(date);

schedules
.filter(s=>s.date.startsWith(full))
.forEach(s=>{

const ev=document.createElement("div");

ev.className=
s.type==="end"
? "event end"
: "event";

const time =
s.date.includes("T")
? s.date.split("T")[1].substring(0,5)
: "";

ev.innerHTML=
time+"<br>"+s.title;

box.appendChild(ev);

});

box.onclick=function(){
openSchedule(full);
};

box.oncontextmenu=function(e){

e.preventDefault();

selectedDate=full;

const menu=document.getElementById("menu");

menu.style.display="block";
menu.style.left=e.pageX+"px";
menu.style.top=e.pageY+"px";
};

cal.appendChild(box);

}
}

function openSchedule(date){

selectedDate=date;

document.getElementById("scheduleDate").innerText=date;

document.getElementById("startDateDate").value=date;
document.getElementById("startDateTime").value="09:00";
document.getElementById("endDateDate").value=date;
document.getElementById("endDateTime").value="18:00";

document.getElementById("scheduleModal").style.display="flex";
}

function closeModal(){
document.getElementById("scheduleModal").style.display="none";
}

function saveSchedule(){

const schedules=getSchedules();

const groupId="g"+Date.now();

const rawTitle=
document.getElementById("scheduleTitle").value;

const customerName =
document.getElementById("selectedCustomer").value;

const title =
customerName
? customerName + "/" + rawTitle.replace(/^.*?[\-\/]/,'').trim()
: rawTitle;
const memo=document.getElementById("scheduleMemo").value;
const customer=document.getElementById("selectedCustomer").value;
const start=
document.getElementById("startDateDate").value+
"T"+
document.getElementById("startDateTime").value;
const end=
document.getElementById("endDateDate").value+
"T"+
document.getElementById("endDateTime").value;
const repeat=document.getElementById("repeatType").value;

function add(date,titleText,type=""){

schedules.push({
groupId:groupId,
date:date,
title:titleText,
memo:memo,
customer:customer,
customer:customer,
type:type
});

}

/* 시작 일정 1개만 생성 */
add(start,title);

/* 종료일이 시작일과 날짜/시간 모두 다를때만 종료 생성 */
if(end !== start){

add(end,title+" 종료","end");

}

if(repeat!==""){

const base=new Date(start);
const endLimit=new Date(end);

for(let i=1;i<=365;i++){

const next=new Date(base);

/* 요일 반복 */
if(repeat==="weekly"){

const checkedDays =
[...document.querySelectorAll(".weekDay:checked")]
.map(x=>parseInt(x.value));

if(checkedDays.length>0){

for(let j=0;j<7;j++){

const temp = new Date(base);

temp.setDate(base.getDate() + ((i-1)*7) + j);

if(checkedDays.includes(temp.getDay())){

/* 시작일 중복 방지 */
if(temp.getTime()===base.getTime()){
continue;
}

/* 종료일 날짜 중복 방지 */
if(
temp.getFullYear()===endLimit.getFullYear()
&&
temp.getMonth()===endLimit.getMonth()
&&
temp.getDate()===endLimit.getDate()
){
continue;
}

if(temp > endLimit){
continue;
}

const nd=
temp.getFullYear()+"-"+
String(temp.getMonth()+1).padStart(2,"0")+"-"+
String(temp.getDate()).padStart(2,"0")+"T"+
String(temp.getHours()).padStart(2,"0")+":"+
String(temp.getMinutes()).padStart(2,"0");

add(nd,title,"repeat");

}

}

continue;

}

}

if(repeat==="daily"){
next.setDate(base.getDate()+i);
}

if(repeat==="weekly"){

const checkedDays =
[...document.querySelectorAll(".weekDay:checked")]
.map(x=>parseInt(x.value));

if(checkedDays.length===0){

next.setDate(base.getDate()+(i*7));

}else{

continue;

}

}

if(repeat==="monthly"){
next.setMonth(base.getMonth()+i);
}

/* 매주 반복 종료일 보정 */
if(repeat==="weekly"){

/* 종료일보다 크면 중단 */
/* 시작일 중복 방지 */
if(next.getTime()===base.getTime()){
continue;
}

/* 종료일 날짜 중복 방지 */
if(
next.getFullYear()===endLimit.getFullYear()
&&
next.getMonth()===endLimit.getMonth()
&&
next.getDate()===endLimit.getDate()
){
continue;
}

if(next > endLimit){
break;
}

/* 종료일 주차 넘으면 중단 */
const weekDiff =
Math.floor(
(next - base) / (1000*60*60*24*7)
);

const compare = new Date(base);

compare.setDate(
base.getDate() + (weekDiff * 7)
);

if(compare > endLimit){
break;
}

}else{

/* 일반 종료 제한 */
if(next > endLimit){
break;
}

}

const nd=
next.getFullYear()+"-"+
String(next.getMonth()+1).padStart(2,"0")+"-"+
String(next.getDate()).padStart(2,"0")+"T"+
String(next.getHours()).padStart(2,"0")+":"+
String(next.getMinutes()).padStart(2,"0");

add(nd,title,"repeat");

}

}

function deleteSelected(){

const checked =
document.querySelector(".chk:checked");

if(!checked){
alert("선택");
return;
}

const gid=checked.value;

let schedules=getSchedules();

schedules=schedules.filter(s=>s.groupId!==gid);


/* 기존 반복 삭제 */
schedules =
schedules.filter(s=>
!(s.groupId===gid && s.type==="repeat")
);

/* 반복 다시 생성 */
const repeatType =
document.getElementById("editRepeatType").value;

if(repeatType!==""){

const base = new Date(newStart);
const endLimit = new Date(newEnd);

for(let i=1;i<=365;i++){

if(repeatType==="weekly"){

const checkedDays =
[...document.querySelectorAll(".editWeekDay:checked")]
.map(x=>parseInt(x.value));

for(let j=0;j<7;j++){

const temp = new Date(base);

temp.setDate(base.getDate()+((i-1)*7)+j);

if(checkedDays.includes(temp.getDay())){

/* 시작일 중복 방지 */
if(temp.getTime()===base.getTime()){
continue;
}

/* 종료일 날짜 중복 방지 */
if(
temp.getFullYear()===endLimit.getFullYear()
&&
temp.getMonth()===endLimit.getMonth()
&&
temp.getDate()===endLimit.getDate()
){
continue;
}

if(temp > endLimit){
continue;
}

const nd=
temp.getFullYear()+"-"+
String(temp.getMonth()+1).padStart(2,"0")+"-"+
String(temp.getDate()).padStart(2,"0")+"T"+
String(temp.getHours()).padStart(2,"0")+":"+
String(temp.getMinutes()).padStart(2,"0");

schedules.push({
groupId:gid,
date:nd,
title:title,
memo:memo,
customer:"",
type:"repeat"
});

}

}

continue;

}

const next=new Date(base);

if(repeatType==="daily"){
next.setDate(base.getDate()+i);
}

if(repeatType==="monthly"){
next.setMonth(base.getMonth()+i);
}

if(next > endLimit){
break;
}

const nd=
next.getFullYear()+"-"+
String(next.getMonth()+1).padStart(2,"0")+"-"+
String(next.getDate()).padStart(2,"0")+"T"+
String(next.getHours()).padStart(2,"0")+":"+
String(next.getMinutes()).padStart(2,"0");

schedules.push({
groupId:gid,
date:nd,
title:title,
memo:memo,
customer:"",
type:"repeat"
});

}

}

saveSchedules(schedules);

renderCalendar();

viewSchedules();
}

function editSelected(){

document.getElementById("editRepeatType").value="";

}

document.getElementById("editModal").style.display="flex";
}
